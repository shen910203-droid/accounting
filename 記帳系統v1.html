<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申瑋記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f0f13; --s1:#18181f; --s2:#22222d; --s3:#2a2a38;
  --border:#2e2e3d; --border2:#3a3a50;
  --accent:#7c6af7; --accent2:#e8845a; --accent3:#4ecb8d; --accent4:#e85a7a;
  --text:#e8e8f0; --t2:#9090a8; --t3:#5a5a72;
  --green:#4ecb8d; --red:#e85a7a; --blue:#7c9ef7; --yellow:#f7c86a; --orange:#e8845a;
  --font:'Noto Sans TC',sans-serif; --mono:'DM Mono',monospace;
  --r:12px; --r-sm:8px; --r-xs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
background:rgba(15,15,19,.95);backdrop-filter:blur(20px);
border-bottom:1px solid var(–border);
display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.nav-brand{font-weight:700;font-size:14px;color:var(–accent);letter-spacing:.08em;}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;}
.nav-tab{flex-shrink:0;padding:5px 12px;border-radius:var(–r-xs);border:none;
background:transparent;color:var(–t2);font-family:var(–font);font-size:12px;cursor:pointer;transition:all .15s;}
.nav-tab:hover{background:var(–s2);color:var(–text);}
.nav-tab.active{background:var(–accent);color:#fff;}
.nav-right{display:flex;gap:6px;}
.btn-xs{padding:5px 10px;border-radius:var(–r-xs);border:1px solid var(–border);
background:var(–s2);color:var(–t2);font-family:var(–font);font-size:11px;cursor:pointer;transition:all .15s;}
.btn-xs:hover{border-color:var(–accent);color:var(–accent);}

/* MAIN */
main{margin-top:52px;padding:20px 16px;max-width:1100px;margin-left:auto;margin-right:auto;margin-top:68px;}
.page{display:none;}.page.active{display:block;}

/* CARDS */
.card{background:var(–s1);border:1px solid var(–border);border-radius:var(–r);padding:18px;}
.card+.card{margin-top:12px;}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(–t3);margin-bottom:14px;}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.stat{background:var(–s1);border:1px solid var(–border);border-radius:var(–r);padding:14px;position:relative;overflow:hidden;}
.stat::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;}
.stat.green::before{background:var(–green);}
.stat.red::before{background:var(–red);}
.stat.blue::before{background:var(–blue);}
.stat.orange::before{background:var(–orange);}
.stat.purple::before{background:var(–accent);}
.stat.yellow::before{background:var(–yellow);}
.stat-label{font-size:10px;color:var(–t3);margin-bottom:5px;letter-spacing:.04em;}
.stat-val{font-family:var(–mono);font-size:18px;font-weight:500;}
.stat-val.green{color:var(–green);}
.stat-val.red{color:var(–red);}
.stat-val.blue{color:var(–blue);}
.stat-val.orange{color:var(–orange);}
.stat-val.purple{color:var(–accent);}
.stat-val.yellow{color:var(–yellow);}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(–r-xs);border:none;font-family:var(–font);font-size:13px;cursor:pointer;font-weight:500;transition:opacity .15s;}
.btn-primary{background:var(–accent);color:#fff;}.btn-primary:hover{opacity:.85;}
.btn-danger{background:rgba(232,90,122,.15);color:var(–red);border:1px solid rgba(232,90,122,.3);}
.btn-danger:hover{background:rgba(232,90,122,.25);}
.btn-ghost{background:var(–s2);color:var(–t2);border:1px solid var(–border);}
.btn-ghost:hover{border-color:var(–accent);color:var(–accent);}

/* SECTION HEADER */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.sh-title{font-size:17px;font-weight:700;}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:10px;color:var(–t3);letter-spacing:.05em;text-transform:uppercase;}
input,select,textarea{background:var(–s2);border:1px solid var(–border);color:var(–text);
padding:8px 11px;border-radius:var(–r-xs);font-family:var(–font);font-size:13px;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(–accent);}
input[readonly]{color:var(–yellow);background:var(–s3);}
textarea{resize:vertical;min-height:56px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg.full{grid-column:1/-1;}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* TOGGLE SECTION */
.toggle-section{border:1px solid var(–border);border-radius:var(–r-sm);overflow:hidden;margin-top:4px;}
.toggle-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(–s2);}
.toggle-header:hover{background:var(–s3);}
.toggle-check{accent-color:var(–accent);width:15px;height:15px;}
.toggle-label{font-size:13px;font-weight:500;}
.toggle-body{padding:14px;display:none;border-top:1px solid var(–border);}
.toggle-body.open{display:block;}

/* TX LIST */
.tx-list{display:flex;flex-direction:column;gap:5px;}
.tx-row{background:var(–s1);border:1px solid var(–border);border-radius:var(–r-sm);
padding:11px 14px;display:grid;align-items:center;gap:10px;transition:border-color .15s;cursor:default;}
.tx-row:hover{border-color:var(–accent);}
.tx-row.main-row{grid-template-columns:76px 90px 1fr auto auto auto;}
.tx-date{font-family:var(–mono);font-size:11px;color:var(–t3);}
.tx-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;}
.tx-desc{font-size:13px;}
.tx-sub{font-size:11px;color:var(–t3);margin-top:2px;}
.tx-amt{font-family:var(–mono);font-size:13px;font-weight:500;text-align:right;white-space:nowrap;}
.tx-amt.out{color:var(–red);}
.tx-amt.in{color:var(–green);}
.tx-amt.neutral{color:var(–blue);}
.tx-pay{font-size:11px;color:var(–t3);text-align:right;}
.tx-del{background:none;border:none;color:var(–t3);cursor:pointer;font-size:16px;padding:1px 5px;border-radius:4px;}
.tx-del:hover{color:var(–red);background:rgba(232,90,122,.1);}
.sub-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;margin-right:3px;margin-top:2px;}
.sub-tag.meal{background:rgba(124,110,247,.15);color:var(–accent);}
.sub-tag.petty{background:rgba(232,132,90,.15);color:var(–orange);}
.sub-tag.adv{background:rgba(247,200,106,.15);color:var(–yellow);}

/* BADGE COLORS */
.b-飲食{background:rgba(78,203,141,.15);color:var(–green);}
.b-交通{background:rgba(124,110,247,.15);color:var(–accent);}
.b-娛樂{background:rgba(232,132,90,.15);color:var(–orange);}
.b-購物{background:rgba(247,200,106,.15);color:var(–yellow);}
.b-服飾{background:rgba(232,90,122,.15);color:var(–red);}
.b-雜支{background:rgba(144,144,168,.15);color:var(–t2);}
.b-醫療{background:rgba(78,160,203,.15);color:#4ea0cb;}
.b-居住{background:rgba(160,124,247,.15);color:#a07cf7;}
.b-收入{background:rgba(78,203,141,.2);color:var(–green);}
.b-內部轉帳{background:rgba(124,158,247,.15);color:var(–blue);}
.b-代墊款{background:rgba(247,200,106,.2);color:var(–yellow);}
.b-代墊回款{background:rgba(78,203,141,.2);color:var(–green);}
.b-信用卡費{background:rgba(232,90,122,.15);color:var(–red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(–s1);border:1px solid var(–border);border-radius:var(–r);
padding:22px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

/* PERSON CARDS */
.person-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px;}
.person-card{background:var(–s1);border:1px solid var(–border);border-radius:var(–r);
padding:14px;text-align:center;}
.person-card.pool-card{border-color:var(–accent);grid-column:1/-1;}
.person-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:16px;margin:0 auto 8px;}
.person-name{font-size:13px;font-weight:500;margin-bottom:3px;}
.person-bal{font-family:var(–mono);font-size:17px;font-weight:700;}
.person-bal.pos{color:var(–green);}
.person-bal.neg{color:var(–red);}

/* ADVANCE PAGE */
.adv-item{background:var(–s1);border:1px solid var(–border);border-radius:var(–r-sm);
padding:11px 14px;display:grid;grid-template-columns:76px 1fr auto auto auto;gap:10px;align-items:center;}
.adv-item.settled{opacity:.45;}
.status-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.status-badge.pending{background:rgba(247,200,106,.2);color:var(–yellow);}
.status-badge.done{background:rgba(78,203,141,.15);color:var(–green);}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.filters select,.filters input{width:auto;}

/* PETTY REPORT AREA */
.petty-report-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.petty-report-bar input{width:140px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;color:var(–t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(–border);letter-spacing:.05em;text-transform:uppercase;}
.tbl td{font-size:12px;padding:8px 8px;border-bottom:1px solid var(–border);}
.tbl tr:last-child td{border-bottom:none;}
.tbl td.mono{font-family:var(–mono);}

/* DIVIDER */
.div{height:1px;background:var(–border);margin:16px 0;}
.empty{text-align:center;padding:40px;color:var(–t3);font-size:13px;}
.chip{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;
background:rgba(124,110,247,.15);color:var(–accent);margin-left:4px;}
.mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16
